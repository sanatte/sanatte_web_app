<section class="px-4 md:px-8 lg:px-container-padding-desktop py-6 max-w-[1400px] mx-auto">

  <app-admin-page-header
    title="Usuarios"
    description="Gestiona las cuentas, roles y accesos de los usuarios de la plataforma." />

  <!-- Stats chips -->
  <div class="flex flex-wrap gap-3 mb-6">
    <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-full border border-outline-variant/40
                text-label-sm font-heading">
      <span class="material-symbols-outlined text-[16px] text-on-surface-variant">group</span>
      <span class="text-on-surface-variant">Total:</span>
      <span class="font-bold text-on-surface">{{ stats().total }}</span>
    </div>
    <div class="flex items-center gap-2 px-4 py-2 bg-green-50 rounded-full border border-green-200
                text-label-sm font-heading">
      <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
      <span class="text-green-700 font-semibold">{{ stats().active }} activos</span>
    </div>
    <div class="flex items-center gap-2 px-4 py-2 bg-primary-fixed rounded-full
                text-label-sm font-heading">
      <span class="material-symbols-outlined text-[15px] text-primary">admin_panel_settings</span>
      <span class="text-on-primary-fixed-variant font-semibold">{{ stats().admins }} admins</span>
    </div>
    <div class="flex items-center gap-2 px-4 py-2 bg-secondary-fixed rounded-full
                text-label-sm font-heading">
      <span class="material-symbols-outlined text-[15px] text-secondary">autorenew</span>
      <span class="text-on-secondary-fixed-variant font-semibold">{{ stats().withSub }} con suscripción</span>
    </div>
  </div>

  <!-- Search -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
    <div class="w-full sm:w-80">
      <app-search-input placeholder="Buscar por nombre o email..." (search)="onSearch($event)" />
    </div>
    <p class="text-label-sm font-heading text-on-surface-variant">
      {{ filtered().length }} usuario{{ filtered().length !== 1 ? 's' : '' }} encontrado{{ filtered().length !== 1 ? 's' : '' }}
    </p>
  </div>

  <!-- Table -->
  <app-user-table
    [users]="paginated()"
    [totalItems]="filtered().length"
    [currentPage]="currentPage()"
    [pageSize]="10"
    (toggleRole)="onToggleRole($event)"
    (toggleStatus)="onToggleStatus($event)"
    (deleteUser)="onDeleteUser($event)"
    (pageChange)="onPageChange($event)" />

</section>

<!-- Confirm Dialog (reutilizado para rol, estado y eliminar) -->
<app-confirm-dialog
  [open]="isConfirmOpen()"
  [title]="confirmConfig().title"
  [message]="confirmConfig().message"
  [confirmText]="confirmConfig().confirmText"
  [variant]="confirmConfig().variant"
  (confirm)="onConfirm()"
  (cancel)="onCancel()" />
