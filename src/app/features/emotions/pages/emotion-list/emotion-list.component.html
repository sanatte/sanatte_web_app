<app-header title="Emotions Management" />

<div class="px-8 pb-8">
  <!-- Toolbar: Search + Filter + Add -->
  <div class="flex items-center gap-4 mb-6">
    <div class="w-full max-w-md">
      <app-search-input
        placeholder="Search emotions..."
        (search)="onSearch($event)"
      />
    </div>

    <div class="ml-auto flex items-center gap-3">
      <!-- Filter Dropdown -->
      <div class="relative">
        <button
          (click)="showFilterDropdown.set(!showFilterDropdown())"
          class="flex items-center gap-2 px-4 py-2.5 border border-gray-200 rounded-xl
                 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75
              6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75
              0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75" />
          </svg>
          Filter
        </button>

        @if (showFilterDropdown()) {
          <div class="absolute right-0 mt-2 w-44 bg-white rounded-xl shadow-lg border border-gray-100
                      py-1 z-30">
            <button
              (click)="onStatusFilter('all')"
              class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 transition-colors"
              [class.text-primary]="statusFilter() === 'all'"
              [class.font-semibold]="statusFilter() === 'all'">
              All
            </button>
            <button
              (click)="onStatusFilter('active')"
              class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 transition-colors"
              [class.text-primary]="statusFilter() === 'active'"
              [class.font-semibold]="statusFilter() === 'active'">
              Active
            </button>
            <button
              (click)="onStatusFilter('inactive')"
              class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 transition-colors"
              [class.text-primary]="statusFilter() === 'inactive'"
              [class.font-semibold]="statusFilter() === 'inactive'">
              Inactive
            </button>
          </div>
        }
      </div>

      <!-- Add Emotion Button -->
      <button
        (click)="openCreateDialog()"
        class="flex items-center gap-2 px-5 py-2.5 gradient-primary text-white text-sm
               font-semibold rounded-xl hover:opacity-90 transition-opacity">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        Add Emotion
      </button>
    </div>
  </div>

  <!-- Loading Skeleton -->
  @if (loading()) {
    <div class="bg-white rounded-2xl border border-gray-100 p-8">
      <div class="animate-pulse space-y-4">
        @for (i of [1,2,3,4,5,6]; track i) {
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-gray-200 rounded-full"></div>
            <div class="flex-1 space-y-2">
              <div class="h-4 bg-gray-200 rounded w-1/4"></div>
              <div class="h-3 bg-gray-100 rounded w-1/2"></div>
            </div>
            <div class="h-6 bg-gray-200 rounded-full w-16"></div>
          </div>
        }
      </div>
    </div>
  } @else {
    <!-- Emotions Table -->
    <app-emotion-table
      [emotions]="paginatedEmotions()"
      (edit)="openEditDialog($event)"
      (delete)="openDeleteDialog($event)"
      (toggleStatus)="onToggleStatus($event)"
    />

    <!-- Pagination -->
    @if (totalFilteredCount() > pageSize) {
      <div class="mt-4">
        <app-pagination
          [currentPage]="currentPage()"
          [pageSize]="pageSize"
          [total]="totalFilteredCount()"
          (pageChange)="onPageChange($event)"
        />
      </div>
    } @else if (totalFilteredCount() > 0) {
      <div class="mt-4 px-2 py-3">
        <p class="text-sm text-gray-500">
          Showing <span class="font-medium text-gray-700">1</span>
          to <span class="font-medium text-gray-700">{{ totalFilteredCount() }}</span>
          of <span class="font-medium text-gray-700">{{ totalFilteredCount() }}</span> results
        </p>
      </div>
    }
  }
</div>

<!-- Create/Edit Dialog -->
<app-emotion-form-dialog
  [open]="showFormDialog()"
  [emotion]="editingEmotion()"
  (save)="onSaveEmotion($event)"
  (cancel)="closeFormDialog()"
/>

<!-- Delete Confirmation Dialog -->
<app-confirm-dialog
  [open]="showDeleteDialog()"
  title="Delete Emotion"
  [message]="'Are you sure you want to delete \'' + (deletingEmotion()?.name ?? '') + '\'? This action cannot be undone.'"
  confirmText="Delete"
  variant="danger"
  (confirm)="confirmDelete()"
  (cancel)="closeDeleteDialog()"
/>
