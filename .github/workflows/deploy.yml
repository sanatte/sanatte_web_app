name: Sanatte Frontend Deployment

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --configuration=production

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            NG_CONFIG=staging
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sanatte_frontend:latest
            ghcr.io/${{ github.repository_owner }}/sanatte_frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/sanatte_frontend:latest
            docker stop sanatte_frontend || true
            docker rm sanatte_frontend || true
            docker run -d --name sanatte_frontend -p 80:80 --restart=always ghcr.io/${{ github.repository_owner }}/sanatte_frontend:latest
